[can]
interface = zlgcan
channel = 0
bitrate = 500000
device_type = ZCAN_USBCANFD_200U
device_index = 0
libpath = library/
resistance = true
physical_id = 0x773
response_id = 0x7B3
functional_id = 0x7DF

[sleep.can_uds]
request_id = 0x773
request_data = 10 01

[wake.can_uds]
request_id = 0x773
request_data = 11 01

[detect.serial]
enabled = true
port = /dev/ttyUSB0
baudrate = 115200
silence_seconds = 0.5
poll_interval_seconds = 0.05

[detect.adb]
enabled = true
adb_path = adb
device_serial =
poll_interval_seconds = 0.5
command_timeout_seconds = 3.0

[timeouts]
sleep_timeout_seconds = 30
wake_timeout_seconds = 30
